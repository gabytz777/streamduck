<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MangaDuck - Premium Manga Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #ff7b2c;
      --accent-rgb: 255, 123, 44;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    button, .btn, .gtab, .nav-btn { background: none; border: none; font-family: inherit; cursor: pointer; outline: none; }

    .fade-in { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    nav {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.2);
      padding: 0 5%; display: flex; align-items: center; height: 70px; gap: 1.5rem;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--accent); cursor: pointer; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-btn { color: var(--muted); font-size: 0.9rem; font-weight: 500; padding: 8px 12px; border-radius: 8px; }
    .nav-btn:hover, .nav-btn.active { color: var(--text); background: rgba(255,255,255,0.06); }
    .nav-btn.active { color: var(--accent); }

    .search-wrap { margin-left: auto; position: relative; max-width: 280px; width: 100%; }
    #searchInput { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px 12px 10px 38px; border-radius: 10px; width: 100%; }
    #searchInput:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .mobile-menu-btn { display: none; color: var(--text); font-size: 1.5rem; }

    .btn { font-weight: 600; font-size: 0.9rem; padding: 10px 20px; border-radius: 10px; display: flex; align-items: center; gap: 8px; width: fit-content; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }

    #hero {
      position: relative; height: 60vh; min-height: 400px; overflow: hidden;
      width: 92%; margin: 1rem auto; border-radius: 20px;
    }
    .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: all 0.8s ease; }
    .hero-fade {
      position: absolute; inset: 0;
      background: linear-gradient(to top, var(--bg) 5%, rgba(0,0,0,0.4) 50%, transparent 100%),
                  linear-gradient(to right, var(--bg) 0%, rgba(0,0,0,0.5) 45%, transparent 75%);
    }
    .hero-content { position: relative; padding: 0 5% 2rem; max-width: 700px; z-index: 2; bottom: 0; position: absolute; bottom: 20px; }
    .hero-badge { background: var(--accent); color: #000; font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 5px; display: inline-block; margin-bottom: 0.8rem; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 6vw, 3.5rem); line-height: 1; }
    .hero-meta { font-size: 0.9rem; color: #ddd; margin: 0.5rem 0; display: flex; gap: 1rem; }
    .hero-overview { font-size: 0.95rem; color: #ccc; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 500px; }
    .hero-dots { position: absolute; bottom: 1rem; right: 2rem; display: flex; gap: 8px; z-index: 10; }
    .hdot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; }
    .hdot.active { background: var(--accent); width: 24px; border-radius: 3px; }

    .shuffler-break {
      width: 92%; margin: 2rem auto;
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      border: 1px solid var(--border); border-radius: 20px;
      padding: 2rem; display: flex; align-items: center; gap: 2rem;
    }
    .shuffler-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }
    .shuffler-desc { color: var(--muted); margin: 0.5rem 0 1rem; }
    .shuffler-display { display: flex; align-items: center; gap: 1.5rem; }
    .shuffler-card-wrap { width: 110px; aspect-ratio: 2/3; border-radius: 10px; overflow: hidden; background: var(--surface2); }
    .shuffler-card img { width: 100%; height: 100%; object-fit: cover; }
    .shuffler-card.spinning { animation: spin 0.6s infinite linear; }
    @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
    .shuffler-info { display: none; }
    .shuffler-info.visible { display: block; }
    .shuffler-name { font-weight: 700; margin-bottom: 1rem; }

    .section { padding: 2rem 5% 0.5rem; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }
    .see-all { color: var(--accent); font-size: 0.8rem; cursor: pointer; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(var(--accent-rgb), 0.3); }
    .scroll-row { display: flex; gap: 16px; overflow-x: auto; padding: 4px 0 16px; scrollbar-width: none; }
    .scroll-row::-webkit-scrollbar { display: none; }
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }

    .card { flex: 0 0 150px; width: 150px; border-radius: var(--radius); overflow: hidden; cursor: pointer; background: var(--surface2); transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); }
    .card-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    .card-overlay { padding: 0.5rem; background: linear-gradient(to top, #000, transparent); margin-top: -50px; position: relative; }
    .card-title { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-rating { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 5px; font-size: 0.7rem; color: gold; }

    #readerModal {
      display: none; position: fixed; inset: 0; z-index: 2000; background: #000; overflow-y: auto;
    }
    #readerModal.open { display: block; }
    .reader-header {
      position: sticky; top: 0; background: #111; padding: 12px 20px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
      border-bottom: 1px solid #333; z-index: 10;
    }
    .chapter-nav { display: flex; gap: 10px; align-items: center; }
    .chapter-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
    .chapter-select { background: #111; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 8px; }
    .reader-img-container { max-width: 900px; margin: 20px auto; text-align: center; }
    .reader-img { width: 100%; margin-bottom: 5px; border-radius: 4px; }
    .close-reader { background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; color: #fff; font-size: 1.2rem; }

    .progress-container { position: fixed; top: 70px; left: 0; width: 100%; height: 3px; background: #333; z-index: 1001; display: none; }
    .progress-fill { height: 100%; width: 0%; background: var(--accent); }
    .history-panel { position: fixed; bottom: 20px; right: 20px; z-index: 1500; }
    .history-toggle { background: var(--accent); color: #000; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.3rem; }
    .history-dropdown { position: absolute; bottom: 60px; right: 0; width: 280px; max-height: 400px; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: none; }
    .history-dropdown.open { display: block; }
    .history-item { display: flex; gap: 10px; padding: 8px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; background: var(--surface2); }
    .history-item:hover { background: rgba(var(--accent-rgb), 0.2); }
    .history-img { width: 40px; height: 56px; object-fit: cover; border-radius: 5px; }
    .history-title { font-size: 0.8rem; font-weight: 600; }
    .history-chapter { font-size: 0.65rem; color: var(--accent); }

    @media (max-width: 768px) {
      .shuffler-break { flex-direction: column; text-align: center; }
      .shuffler-display { flex-direction: column; }
      .nav-links { display: none; }
      .nav-links.mobile-open { display: flex; flex-direction: column; position: absolute; top: 70px; left: 0; right: 0; background: #0a0a0f; padding: 1rem; }
      .mobile-menu-btn { display: block; }
      .search-wrap { display: none; }
      .search-wrap.active { display: block; position: absolute; top: 70px; left: 0; right: 0; background: #0a0a0f; padding: 10px; z-index: 999; }
    }
  </style>
</head>
<body>

<div class="progress-container" id="progressContainer"><div class="progress-fill" id="progressFill"></div></div>

<nav>
  <div class="logo" onclick="Router.go('home')">🐥 MangaDuck</div>
  <div class="nav-links" id="navLinks">
    <button class="nav-btn" data-sec="home" onclick="Router.go('home')">Home</button>
    <button class="nav-btn" data-sec="popular" onclick="Router.go('popular')">Popular</button>
    <button class="nav-btn" data-sec="top" onclick="Router.go('top')">Top Rated</button>
    <button class="nav-btn" data-sec="search" onclick="Router.go('search')">Search</button>
  </div>
  <div class="search-wrap" id="searchWrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search manga..." autocomplete="off">
  </div>
  <div style="display: flex; gap: 10px;">
    <button class="mobile-menu-btn" onclick="UI.toggleSearch()">🔍</button>
    <button class="mobile-menu-btn" onclick="UI.toggleMobileMenu()">☰</button>
  </div>
</nav>

<main id="app"></main>

<div class="history-panel">
  <div class="history-toggle" onclick="UI.toggleHistory()">📚</div>
  <div class="history-dropdown" id="historyDropdown"><div id="historyList"></div></div>
</div>

<template id="home-tpl">
  <div id="hero"><div class="hero-bg" id="heroBg"></div><div class="hero-fade"></div><div class="hero-content"><div class="hero-badge">✨ FEATURED</div><h1 class="hero-title" id="heroTitle">-</h1><div class="hero-meta" id="heroMeta"></div><p class="hero-overview" id="heroOverview"></p><button class="btn btn-primary" id="heroReadBtn">📖 Read Now</button></div><div class="hero-dots" id="heroDots"></div></div>
  <div class="section"><div class="section-header"><h2 class="section-title">🔥 Trending Now</h2><a class="see-all" onclick="Router.go('popular')">See All →</a></div><div class="scroll-row" id="trendingRow"></div></div>
  <div class="shuffler-break"><div class="shuffler-text"><h2 class="shuffler-title">🎲 Feeling Lucky?</h2><p class="shuffler-desc">Let the Duck pick your next read.</p><button class="btn btn-primary" id="shuffleBtn">Spin the Wheel</button></div><div class="shuffler-display"><div class="shuffler-card-wrap"><div class="shuffler-card" id="shuffleCard"><img src="" id="shuffleImg"></div></div><div class="shuffler-info" id="shuffleInfo"><div class="shuffler-name" id="shuffleName"></div><button class="btn btn-primary" id="shuffleReadBtn">📖 Read</button></div></div></div>
  <div class="section"><div class="section-header"><h2 class="section-title">⭐ Top Rated All Time</h2><a class="see-all" onclick="Router.go('top')">See All →</a></div><div class="scroll-row" id="topRow"></div></div>
</template>

<template id="grid-tpl"><div class="section"><h1 id="gridTitle" class="section-title"></h1><div class="movie-grid" id="movieGrid"></div><div style="text-align:center; margin:2rem"><button class="btn btn-secondary" onclick="App.loadMore()">Load More</button></div></div></template>

<div id="readerModal"><div class="reader-header"><div><strong id="readerMangaTitle"></strong> — <span id="readerChapterLabel"></span></div><div class="chapter-nav"><button class="chapter-btn" id="prevChapterBtn">◀ Prev</button><select id="chapterSelect" class="chapter-select"></select><button class="chapter-btn" id="nextChapterBtn">Next ▶</button></div><button class="close-reader" onclick="UI.closeReader()">✕</button></div><div id="readerPages" class="reader-img-container"></div></div>

<footer style="padding:2rem;text-align:center;color:#666"><p>MangaDuck © 2026 | Data: Jikan API (MyAnimeList) + Comick API</p></footer>

<script>
// ============================================
// JIKAN API (MyAnimeList) - WORKS, NO CORS
// ============================================
const JIKAN_API = 'https://api.jikan.moe/v4';
const COMICK_API = 'https://comick-source-api.notaspider.dev';

// State
const State = {
  currentSection: 'home',
  currentPage: 1,
  heroItems: [],
  heroIndex: 0,
  heroTimer: null,
  idleItems: [],
  idleIndex: 0,
  idleTimer: null,
  isShuffling: false,
  currentManga: null,
  currentChapters: [],
  currentChapterIndex: 0,
  currentMalId: null,
  searchTimer: null
};

// History
const History = {
  add(malId, title, chapter, cover) {
    let hist = JSON.parse(localStorage.getItem('mangaHistory') || '[]');
    hist = hist.filter(h => h.malId !== malId);
    hist.unshift({ malId, title, chapter, cover, time: Date.now() });
    localStorage.setItem('mangaHistory', JSON.stringify(hist.slice(0, 20)));
    UI.renderHistory();
  },
  get() { return JSON.parse(localStorage.getItem('mangaHistory') || '[]'); },
  renderHistory() { /* in UI */ }
};

// Progress
const Progress = {
  save(malId, chapterId, percent) { localStorage.setItem(`prog_${malId}_${chapterId}`, percent); },
  get(malId, chapterId) { return parseFloat(localStorage.getItem(`prog_${malId}_${chapterId}`)) || 0; },
  update(percent) { document.getElementById('progressFill').style.width = `${percent}%`; },
  show() { document.getElementById('progressContainer').style.display = 'block'; },
  hide() { document.getElementById('progressContainer').style.display = 'none'; }
};

// Jikan API calls
const Jikan = {
  async getTrending(limit = 20) {
    const res = await fetch(`${JIKAN_API}/top/manga?filter=bypopularity&limit=${limit}`);
    const data = await res.json();
    return data.data || [];
  },
  async getTopRated(limit = 20) {
    const res = await fetch(`${JIKAN_API}/top/manga?filter=rating&limit=${limit}`);
    const data = await res.json();
    return data.data || [];
  },
  async search(query, limit = 30) {
    const res = await fetch(`${JIKAN_API}/manga?q=${encodeURIComponent(query)}&limit=${limit}`);
    const data = await res.json();
    return data.data || [];
  },
  async getMangaById(id) {
    const res = await fetch(`${JIKAN_API}/manga/${id}/full`);
    const data = await res.json();
    return data.data;
  },
  getCoverUrl(manga) {
    return manga.images?.jpg?.large_image_url || manga.images?.jpg?.image_url || '';
  }
};

// Comick API for chapters (working source)
const Comick = {
  async getChapters(title, malId) {
    // Search Comick for the manga first
    const searchRes = await fetch(`${COMICK_API}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: title, source: 'all' })
    });
    const searchData = await searchRes.json();
    if (!searchData.results || searchData.results.length === 0) return [];
    
    // Get first result's chapter list
    const mangaUrl = searchData.results[0].url;
    const chapterRes = await fetch(`${COMICK_API}/api/chapters`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: mangaUrl, source: 'mangaread' })
    });
    const chapterData = await chapterRes.json();
    return chapterData.chapters || [];
  },
  async getChapterPages(chapterUrl) {
    // For actual page images, we'd need to fetch the chapter page
    // Many sources don't expose raw images directly via API
    // Fallback to using chapter URL scraping via proxy
    const proxyRes = await fetch(`${COMICK_API}/api/proxy/html?url=${encodeURIComponent(chapterUrl)}`);
    const html = await proxyRes.text();
    // Simple image extraction from HTML
    const imgMatches = html.match(/<img[^>]+src="([^"]+)"[^>]*>/gi) || [];
    const images = [];
    for (const img of imgMatches) {
      const srcMatch = img.match(/src="([^"]+)"/);
      if (srcMatch && srcMatch[1].includes('.jpg') || srcMatch[1].includes('.png')) {
        images.push(srcMatch[1]);
      }
    }
    return images;
  }
};

// Alternative direct image source using external manga sites
const ExternalReader = {
  // Use MangaSee123 or MangaKakalot direct embed
  getReadUrl(malId, chapterNum) {
    // MangaSee uses manga ID mappings - we'll use a search-based approach
    return `https://mangasee123.com/search?name=${encodeURIComponent(State.currentManga?.title)}`;
  }
};

const UI = {
  app: document.getElementById('app'),
  
  renderHistory() {
    const history = History.get();
    const container = document.getElementById('historyList');
    if (!container) return;
    if (history.length === 0) { container.innerHTML = '<div style="color:#666;text-align:center">No history</div>'; return; }
    container.innerHTML = history.map(h => `
      <div class="history-item" onclick="App.resumeReading(${h.malId})">
        <img class="history-img" src="${h.cover}" onerror="this.src='https://via.placeholder.com/40x56'">
        <div><div class="history-title">${h.title}</div><div class="history-chapter">Chapter ${h.chapter}</div></div>
      </div>
    `).join('');
  },
  
  toggleHistory() { document.getElementById('historyDropdown').classList.toggle('open'); },
  toggleSearch() { document.getElementById('searchWrap').classList.toggle('active'); },
  toggleMobileMenu() { document.getElementById('navLinks').classList.toggle('mobile-open'); },
  
  updateNav(section) {
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.sec === section));
  },
  
  renderSection(section) {
    const tpl = document.getElementById(section === 'home' ? 'home-tpl' : 'grid-tpl');
    this.app.innerHTML = '';
    this.app.appendChild(tpl.content.cloneNode(true));
    if (section === 'home') App.initHome();
    else if (section === 'popular') App.initGrid('Popular Manga', Jikan.getTrending);
    else if (section === 'top') App.initGrid('Top Rated Manga', Jikan.getTopRated);
    else if (section === 'search') {
      document.getElementById('gridTitle').innerText = 'Search Results';
      document.getElementById('movieGrid').innerHTML = '<div style="text-align:center;padding:2rem">Enter a search term above 🔍</div>';
    }
    this.renderHistory();
  },
  
  createCard(manga) {
    const card = document.createElement('div');
    card.className = 'card fade-in';
    const title = manga.title || 'Unknown';
    const score = manga.score || 'N/A';
    const cover = Jikan.getCoverUrl(manga);
    card.innerHTML = `<img class="card-poster" src="${cover}" onerror="this.src='https://via.placeholder.com/150x225?text=${encodeURIComponent(title.slice(0,10))}'"><div class="card-rating">⭐ ${score}</div><div class="card-overlay"><div class="card-title">${title}</div></div>`;
    card.onclick = () => App.openManga(manga);
    return card;
  },
  
  openReader(manga, chapters, startIdx) {
    State.currentManga = manga;
    State.currentChapters = chapters;
    State.currentChapterIndex = startIdx;
    State.currentMalId = manga.mal_id;
    document.getElementById('readerMangaTitle').innerText = manga.title;
    this.loadChapter();
    document.getElementById('readerModal').classList.add('open');
    Progress.show();
    document.body.style.overflow = 'hidden';
  },
  
  async loadChapter() {
    const ch = State.currentChapters[State.currentChapterIndex];
    if (!ch) return;
    document.getElementById('readerChapterLabel').innerText = `Chapter ${ch.number || ch.chapter || '?'}`;
    
    // Try to get images from multiple sources
    let images = [];
    
    // Method 1: Try Comick API for this specific chapter
    if (ch.url) {
      try {
        const proxyRes = await fetch(`${COMICK_API}/api/proxy/html?url=${encodeURIComponent(ch.url)}`);
        const html = await proxyRes.text();
        const imgMatches = html.match(/<img[^>]+src="([^">]+\.(jpg|jpeg|png|webp))"[^>]*>/gi) || [];
        for (const img of imgMatches) {
          const srcMatch = img.match(/src="([^"]+)"/);
          if (srcMatch) images.push(srcMatch[1]);
        }
      } catch(e) { console.log('Comick proxy failed', e); }
    }
    
    // Method 2: If no images, use placeholder + instruction
    if (images.length === 0) {
      images = ['https://via.placeholder.com/800x1200?text=Chapter+Images+Available+on+External+Site'];
    }
    
    const container = document.getElementById('readerPages');
    container.innerHTML = images.map(img => `<img class="reader-img" src="${img}" loading="lazy" onerror="this.src='https://via.placeholder.com/800x1200?text=Image+Load+Failed'">`).join('');
    
    // Update chapter select
    const select = document.getElementById('chapterSelect');
    select.innerHTML = State.currentChapters.map((c, i) => `<option value="${i}">Chapter ${c.number || c.chapter || '?'}</option>`).join('');
    select.value = State.currentChapterIndex;
    select.onchange = (e) => { State.currentChapterIndex = parseInt(e.target.value); this.loadChapter(); };
    
    document.getElementById('prevChapterBtn').onclick = () => { if (State.currentChapterIndex > 0) { State.currentChapterIndex--; this.loadChapter(); } };
    document.getElementById('nextChapterBtn').onclick = () => { if (State.currentChapterIndex < State.currentChapters.length - 1) { State.currentChapterIndex++; this.loadChapter(); } };
    
    // Add to history
    History.add(State.currentMalId, State.currentManga.title, ch.number || ch.chapter || '?', Jikan.getCoverUrl(State.currentManga));
    this.renderHistory();
    
    // Restore scroll progress
    setTimeout(() => {
      const saved = Progress.get(State.currentMalId, ch.id || ch.number);
      const modal = document.getElementById('readerModal');
      if (saved > 0) modal.scrollTop = (modal.scrollHeight - modal.clientHeight) * (saved / 100);
      modal.onscroll = () => {
        const percent = modal.scrollTop / (modal.scrollHeight - modal.clientHeight) * 100;
        Progress.update(percent);
        Progress.save(State.currentMalId, ch.id || ch.number, percent);
      };
    }, 200);
  },
  
  closeReader() {
    document.getElementById('readerModal').classList.remove('open');
    Progress.hide();
    document.body.style.overflow = '';
  }
};

const App = {
  async initHome() {
    const trending = await Jikan.getTrending(12);
    const topRated = await Jikan.getTopRated(12);
    State.heroItems = trending.slice(0, 6);
    
    const trendingRow = document.getElementById('trendingRow');
    const topRow = document.getElementById('topRow');
    if (trendingRow) trending.forEach(m => trendingRow.appendChild(UI.createCard(m)));
    if (topRow) topRated.forEach(m => topRow.appendChild(UI.createCard(m)));
    
    this.initHero();
    this.initShuffler(trending);
  },
  
  initHero() {
    if (!State.heroItems.length) return;
    this.setHero(0);
    if (State.heroTimer) clearInterval(State.heroTimer);
    State.heroTimer = setInterval(() => this.setHero((State.heroIndex + 1) % State.heroItems.length), 7000);
    
    const dots = document.getElementById('heroDots');
    if (dots) dots.innerHTML = State.heroItems.map((_, i) => `<div class="hdot" onclick="App.setHero(${i})"></div>`).join('');
  },
  
  setHero(idx) {
    State.heroIndex = idx;
    const m = State.heroItems[idx];
    if (!m) return;
    document.getElementById('heroBg').style.backgroundImage = `url(${Jikan.getCoverUrl(m)})`;
    document.getElementById('heroTitle').innerText = m.title;
    document.getElementById('heroOverview').innerText = m.synopsis || 'No description available.';
    document.getElementById('heroMeta').innerHTML = `<span>⭐ ${m.score || 'N/A'}</span><span>📅 ${m.published?.prop?.from?.year || 'Unknown'}</span><span>📖 ${m.status || 'Unknown'}</span>`;
    document.getElementById('heroReadBtn').onclick = () => this.openManga(m);
    document.querySelectorAll('.hdot').forEach((dot, i) => dot.classList.toggle('active', i === idx));
  },
  
  async initShuffler(mangas) {
    State.idleItems = mangas;
    State.idleIndex = 0;
    if (mangas[0]) document.getElementById('shuffleImg').src = Jikan.getCoverUrl(mangas[0]);
    
    if (State.idleTimer) clearInterval(State.idleTimer);
    State.idleTimer = setInterval(() => {
      if (!State.isShuffling) {
        State.idleIndex = (State.idleIndex + 1) % State.idleItems.length;
        const img = document.getElementById('shuffleImg');
        if (img) img.src = Jikan.getCoverUrl(State.idleItems[State.idleIndex]);
      }
    }, 4000);
    
    document.getElementById('shuffleBtn').onclick = () => this.shuffle();
  },
  
  async shuffle() {
    State.isShuffling = true;
    const card = document.getElementById('shuffleCard');
    const info = document.getElementById('shuffleInfo');
    card.classList.add('spinning');
    info.classList.remove('visible');
    
    const randomPage = Math.floor(Math.random() * 10) + 1;
    const res = await fetch(`${JIKAN_API}/top/manga?filter=bypopularity&limit=20&page=${randomPage}`);
    const data = await res.json();
    const randomManga = data.data[Math.floor(Math.random() * data.data.length)];
    
    setTimeout(() => {
      card.classList.remove('spinning');
      document.getElementById('shuffleImg').src = Jikan.getCoverUrl(randomManga);
      document.getElementById('shuffleName').innerText = randomManga.title;
      document.getElementById('shuffleReadBtn').onclick = () => this.openManga(randomManga);
      info.classList.add('visible');
      State.isShuffling = false;
    }, 800);
  },
  
  async initGrid(title, fetchFn) {
    document.getElementById('gridTitle').innerText = title;
    State.currentFetch = fetchFn;
    State.currentPage = 1;
    await this.loadGrid(1);
  },
