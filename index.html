<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamDuck</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: rgba(255,255,255,0.07);
  --accent: #ffa500;
  --text: #f0f0f0;
  --muted: #888;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ================= NAV ================= */

nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  gap: 2rem;
  height: 60px;
}

.logo {
  font-family: 'Bebas Neue';
  font-size: 1.8rem;
  color: var(--accent);
  cursor: pointer;
}

.nav-links {
  display: flex;
  gap: 1rem;
}

.nav-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 6px 14px;
  border-radius: 6px;
}

.nav-btn.active {
  background: var(--surface2);
  color: var(--text);
}

.search-wrap {
  margin-left: auto;
  position: relative;
}

#searchInput {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px 8px 36px;
  border-radius: 8px;
  width: 240px;
}

/* ================= HERO ================= */

#hero {
  position: relative;
  height: 500px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.hero-fade {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, var(--bg), transparent);
}

.hero-content {
  position: relative;
  padding: 2rem 3rem;
  max-width: 600px;
}

.hero-title {
  font-family: 'Bebas Neue';
  font-size: 3.5rem;
}

.hero-meta {
  color: var(--muted);
  font-size: 0.85rem;
  display: flex;
  gap: 1rem;
}

.hero-overview {
  color: #ccc;
  margin-top: 10px;
  font-size: 0.9rem;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.hero-actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.btn-primary {
  background: var(--accent);
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
}

/* ================= ROWS ================= */

.section {
  padding: 2rem;
}

.section-title {
  font-family: 'Bebas Neue';
  font-size: 1.6rem;
  margin-bottom: 1rem;
}

.scroll-row {
  display: flex;
  gap: 14px;
  overflow-x: auto;
}

.card {
  flex: 0 0 160px;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
}

.card-poster {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
}

/* ================= GRID ================= */

.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
}

/* ================= RESPONSIVE FIX ================= */

@media (max-width: 900px) {

  nav {
    flex-wrap: wrap;
    height: auto;
    padding: 10px 1rem;
  }

  .nav-links {
    width: 100%;
    justify-content: space-between;
  }

  .search-wrap {
    width: 100%;
  }

  #searchInput {
    width: 100%;
  }

  #hero {
    height: auto;
    min-height: 420px;
  }

  .hero-title {
    font-size: 2.4rem;
  }

  .hero-content {
    padding: 1.2rem;
  }

  .hero-actions {
    flex-direction: column;
  }

  .btn-primary,
  .btn-secondary {
    width: 100%;
  }

  .card {
    flex: 0 0 140px;
  }
}

</style>
</head>

<body>

<nav>
  <div class="logo" onclick="goHome()">🦆 StreamDuck</div>

  <div class="nav-links">
    <button class="nav-btn active" onclick="showSection('home')">Home</button>
    <button class="nav-btn" onclick="showSection('movies')">Movies</button>
    <button class="nav-btn" onclick="showSection('tv')">TV</button>
    <button class="nav-btn" onclick="showSection('trending')">Trending</button>
  </div>

  <div class="search-wrap">
    <input id="searchInput" placeholder="Search..." oninput="handleSearch(this.value)">
  </div>
</nav>

<!-- HERO -->
<div id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-fade"></div>

  <div class="hero-content">
    <div class="hero-title" id="heroTitle">Loading...</div>
    <div class="hero-meta" id="heroMeta"></div>
    <div class="hero-overview" id="heroOverview"></div>

    <div class="hero-actions">
      <button class="btn-primary" id="heroPlayBtn">Watch</button>
      <button class="btn-secondary" id="heroInfoBtn">Info</button>
    </div>
  </div>
</div>

<!-- ROWS -->
<div class="section">
  <div class="section-title">🔥 Trending</div>
  <div class="scroll-row" id="trendingRow"></div>
</div>

<div class="section">
  <div class="section-title">⭐ Top Rated</div>
  <div class="scroll-row" id="topRatedRow"></div>
</div>

<div class="section">
  <div class="section-title">📺 TV Shows</div>
  <div class="scroll-row" id="tvRow"></div>
</div>

<script>

/* ================= TMDB API RESTORED ================= */

const TMDB_KEY = 'a31a9bbd61ad9d66f465457558a2d397';
const TMDB = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/';

async function api(path, params = {}) {
  const q = new URLSearchParams({ api_key: TMDB_KEY, language: 'en-US', ...params });
  const r = await fetch(`${TMDB}${path}?${q}`);
  return r.json();
}

/* ================= LOAD ================= */

let heroItems = [];
let heroIndex = 0;

window.onload = async () => {
  const trending = await api('/trending/movie/week');
  heroItems = trending.results.slice(0, 5);
  setHero(0);

  loadRow('trendingRow', '/trending/movie/week');
  loadRow('topRatedRow', '/movie/top_rated');
  loadRow('tvRow', '/tv/popular');
};

/* ================= HERO ================= */

function setHero(i) {
  const m = heroItems[i];
  if (!m) return;

  document.getElementById('heroBg').style.backgroundImage =
    `url(${IMG}w1280${m.backdrop_path})`;

  document.getElementById('heroTitle').textContent = m.title || m.name;

  document.getElementById('heroMeta').innerHTML =
    `⭐ ${m.vote_average} • ${m.release_date?.slice(0,4)}`;

  document.getElementById('heroOverview').textContent = m.overview;

  document.getElementById('heroPlayBtn').onclick = () => alert('Play: ' + m.title);
}

/* ================= ROWS ================= */

function cardHTML(m) {
  return `
  <div class="card">
    <img class="card-poster" src="${IMG}w342${m.poster_path}">
  </div>`;
}

async function loadRow(id, path) {
  const d = await api(path);
  document.getElementById(id).innerHTML =
    d.results.map(cardHTML).join('');
}

/* ================= SEARCH FIX ================= */

function handleSearch(v) {
  if (!v.trim()) return;
  console.log("Search:", v);
}

function showSection() {}
function goHome() {}

</script>

</body>
</html>
