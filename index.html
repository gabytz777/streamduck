<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamDuck</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: rgba(255,255,255,0.07);
  --accent: #ffa500;
  --text: #f0f0f0;
  --muted: #888;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

/* ================= NAV ================= */

nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);

  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 10px 1rem;
  flex-wrap: wrap;
}

.logo {
  font-family: 'Bebas Neue';
  font-size: 1.6rem;
  color: var(--accent);
  cursor: pointer;
}

.nav-links {
  display: flex;
  gap: 6px;
  flex: 1;
  flex-wrap: wrap;
}

.nav-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 0.85rem;
  cursor: pointer;
  flex: 1;
  min-width: 80px;
}

.nav-btn.active {
  background: var(--surface2);
  color: var(--text);
}

.search-wrap {
  width: 100%;
}

#searchInput {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  outline: none;
}

.search-icon {
  position: absolute;
  margin-left: 10px;
  margin-top: 10px;
  color: var(--muted);
}

/* ================= HERO ================= */

#hero {
  position: relative;
  min-height: 380px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.hero-fade {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, var(--bg), transparent);
}

.hero-content {
  position: relative;
  padding: 1.2rem;
  max-width: 100%;
}

.hero-title {
  font-family: 'Bebas Neue';
  font-size: 2.2rem;
}

.hero-meta {
  font-size: 0.8rem;
  color: var(--muted);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.hero-overview {
  font-size: 0.85rem;
  margin-top: 10px;
  color: #ccc;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.hero-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}

.btn-primary,
.btn-secondary {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  width: 100%;
}

.btn-primary {
  background: var(--accent);
  color: black;
  font-weight: bold;
}

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
}

/* ================= SECTIONS ================= */

.section {
  padding: 1rem;
}

.section-title {
  font-family: 'Bebas Neue';
  font-size: 1.4rem;
}

/* ================= SCROLL ROW ================= */

.scroll-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.card {
  flex: 0 0 130px;
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
}

/* ================= GRID ================= */

.movie-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

/* ================= TABLET ================= */

@media (min-width: 700px) {

  .nav-links {
    flex-wrap: nowrap;
  }

  .nav-btn {
    min-width: auto;
  }

  .search-wrap {
    width: 250px;
    margin-left: auto;
  }

  .hero-title {
    font-size: 3rem;
  }

  .hero-actions {
    flex-direction: row;
  }

  .btn-primary,
  .btn-secondary {
    width: auto;
  }

  .movie-grid {
    grid-template-columns: repeat(4, 1fr);
  }

  .card {
    flex: 0 0 150px;
  }
}

/* ================= DESKTOP ================= */

@media (min-width: 1100px) {

  .section {
    padding: 2rem 3rem;
  }

  .movie-grid {
    grid-template-columns: repeat(6, 1fr);
  }

  .hero-content {
    max-width: 600px;
    padding: 2.5rem;
  }

  #hero {
    min-height: 520px;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo" onclick="goHome()">🦆 StreamDuck</div>

  <div class="nav-links" id="navLinks">
    <button class="nav-btn active">Home</button>
    <button class="nav-btn">Movies</button>
    <button class="nav-btn">TV</button>
    <button class="nav-btn">Trending</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" placeholder="Search..." />
  </div>
</nav>

<!-- HERO -->
<div id="hero">
  <div class="hero-bg"></div>
  <div class="hero-fade"></div>

  <div class="hero-content">
    <div class="hero-title">Loading...</div>
    <div class="hero-meta">⭐ 8.5 • 2026</div>
    <div class="hero-overview">
      Description goes here...
    </div>

    <div class="hero-actions">
      <button class="btn-primary">Watch</button>
      <button class="btn-secondary">More Info</button>
    </div>
  </div>
</div>

<!-- SECTION -->
<div class="section">
  <div class="section-title">🔥 Trending</div>
  <div class="scroll-row">
    <div class="card"><img></div>
    <div class="card"><img></div>
    <div class="card"><img></div>
  </div>
</div>

<!-- GRID -->
<div class="section">
  <div class="section-title">📺 Explore</div>
  <div class="movie-grid">
    <div class="card"><img></div>
    <div class="card"><img></div>
    <div class="card"><img></div>
    <div class="card"><img></div>
  </div>
</div>

</body>
</html>
