<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StreamDuck</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #ffa500;
      --accent-rgb: 255, 165, 0;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body.theme-movies { --accent: #e50914; --accent-rgb: 229, 9, 20; --bg: #050507; }
    body.theme-tv { --accent: #3da9ff; --accent-rgb: 61, 169, 255; --bg: #05070f; }
    body.theme-trending { --accent: #00ff7b; --accent-rgb: 0, 255, 123; --bg: #050a06; }
    body.theme-anime { --accent: #ff69b4; --accent-rgb: 255, 105, 180; --bg: #140611; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; transition: background 0.5s ease; }
    button, .btn, .gtab, .nav-btn { appearance: none; -webkit-appearance: none; background: none; border: none; font-family: inherit; cursor: pointer; outline: none; user-select: none; }
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .hidden-section { display: none; }

    /* Hypastack Top Promo Banner */
    .promo-banner {
      background: linear-gradient(90deg, #13131f 0%, #0c0c12 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 5%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      position: relative;
      z-index: 1001;
    }
    .promo-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: cover;
    }
    .promo-text {
      display: flex;
      flex-direction: column;
    }
    .promo-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
    }
    .promo-subtitle {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .promo-btn {
      margin-left: 8px;
      background: #fff;
      color: #000;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      text-decoration: none;
      transition: var(--transition);
      white-space: nowrap;
    }
    .promo-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
    }

    nav {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(10, 10, 15, 0.7);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.18);
      box-shadow: 0 1px 0 rgba(var(--accent-rgb), 0.08), 0 4px 24px rgba(0,0,0,0.35);
      padding: 0 5%; display: flex; align-items: center; height: 70px; gap: 1.5rem; width: 100%;
      transition: border-color 0.5s ease, box-shadow 0.5s ease;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--accent); letter-spacing: 1px; cursor: pointer; white-space: nowrap; transition: color 0.5s ease; }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-btn { color: var(--muted); font-size: 0.9rem; font-weight: 500; padding: 8px 12px; border-radius: 8px; transition: var(--transition); }
    .nav-btn:hover, .nav-btn.active { color: var(--text); background: rgba(255,255,255,0.06); }
    .nav-btn.active { color: var(--accent); }
    .search-wrap { margin-left: auto; position: relative; max-width: 280px; width: 100%; }
    #searchInput { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--text); font-family: inherit; font-size: 0.85rem; padding: 10px 12px 10px 38px; border-radius: 10px; width: 100%; outline: none; transition: var(--transition); }
    #searchInput:focus { border-color: var(--accent); background: rgba(255,255,255,0.09); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 0.9rem; }
    .mobile-menu-btn { display: none; color: var(--text); font-size: 1.5rem; }
    .btn { font-weight: 600; font-size: 0.9rem; padding: 10px 20px; border-radius: 10px; transition: var(--transition); display: flex; align-items: center; gap: 8px; justify-content: center; width: fit-content; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; backdrop-filter: blur(10px); }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    #hero { position: relative; height: 65vh; min-height: 380px; overflow: hidden; display: flex; align-items: flex-end; width: 92%; margin: 1rem auto; border-radius: 20px; }
    .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center 20%; transition: background-image 0.8s ease-in-out, transform 1.2s ease-out; transform: scale(1.05); }
    #hero.active .hero-bg { transform: scale(1); }
    .hero-fade { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 5%, rgba(10,10,15,0.4) 50%, transparent 100%), linear-gradient(to right, var(--bg) 0%, rgba(10,10,15,0.6) 45%, transparent 75%); }
    .hero-content { position: relative; padding: 0 5% 2.5rem; max-width: 800px; z-index: 2; width: 100%; }
    .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #000; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 5px 10px; border-radius: 5px; margin-bottom: 0.8rem; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 7vw, 3.8rem); line-height: 0.95; margin-bottom: 0.8rem; }
    .hero-meta { font-size: 0.95rem; color: #eee; margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .hero-overview { font-size: 1rem; line-height: 1.6; color: #ddd; margin-bottom: 1.5rem; max-width: 550px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .hero-actions { display: flex; gap: 0.8rem; }
    .hero-dots { position: absolute; bottom: 1.5rem; right: 5%; display: flex; gap: 8px; z-index: 10; }
    .hdot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: var(--transition); cursor: pointer; }
    .hdot.active { background: var(--accent); width: 24px; border-radius: 3px; }
    .shuffler-break { width: 92%; margin: 2.5rem auto; background: linear-gradient(90deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; display: flex; align-items: center; gap: 3rem; position: relative; overflow: hidden; }
    .shuffler-break::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(var(--accent-rgb), 0.1), transparent 70%); pointer-events: none; }
    .shuffler-text { flex: 1; z-index: 1; }
    .shuffler-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; margin-bottom: 0.4rem; letter-spacing: 1px; }
    .shuffler-desc { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.2rem; }
    .shuffler-display { display: flex; align-items: center; gap: 2rem; z-index: 1; }
    .shuffler-card-wrap { width: 120px; aspect-ratio: 2/3; position: relative; perspective: 1000px; flex-shrink: 0; }
    .shuffler-card { width: 100%; height: 100%; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); overflow: hidden; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .shuffler-card img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }
    .shuffler-card.spinning { animation: spinCard 0.8s infinite linear; }
    @keyframes spinCard { 0% { transform: rotateY(0deg) scale(0.9); } 50% { transform: rotateY(180deg) scale(0.8); } 100% { transform: rotateY(360deg) scale(0.9); } }
    .shuffler-info { display: none; opacity: 0; transform: translateX(10px); transition: 0.4s ease; min-width: 200px; }
    .shuffler-info.visible { display: block; opacity: 1; transform: translateX(0); }
    .shuffler-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .shuffler-btns { display: flex; gap: 10px; }
    .section { padding: 2rem 5% 1rem; width: 100%; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; gap: 1rem; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 1px; }
    .see-all { color: var(--accent); font-size: 0.82rem; font-weight: 700; cursor: pointer; white-space: nowrap; padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(var(--accent-rgb), 0.35); background: rgba(var(--accent-rgb), 0.08); transition: var(--transition); letter-spacing: 0.3px; }
    .see-all:hover { background: rgba(var(--accent-rgb), 0.18); border-color: var(--accent); transform: translateX(2px); }
    .scroll-row { display: flex; gap: 16px; overflow-x: auto; padding: 4px 0 16px; scrollbar-width: none; }
    .scroll-row::-webkit-scrollbar { display: none; }
    .genre-tabs { display: flex; gap: 0.6rem; overflow-x: auto; padding-bottom: 1rem; scrollbar-width: none; }
    .gtab { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 0.85rem; white-space: nowrap; padding: 8px 16px; border-radius: 100px; transition: var(--transition); }
    .gtab:hover, .gtab.active { background: var(--accent); color: #000; font-weight: 600; border-color: var(--accent); }
    .card { flex: 0 0 160px; width: 160px; position: relative; border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: var(--transition); background: var(--surface2); }
    .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
    .card-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #222; }
    .card-overlay { position: absolute; inset: 0; padding: 1rem; display: flex; flex-direction: column; justify-content: flex-end; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); opacity: 0; transition: var(--transition); }
    .card:hover .card-overlay { opacity: 1; }
    .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .card-year { font-size: 0.8rem; color: var(--muted); }
    .card-rating { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: var(--accent); font-size: 0.75rem; font-weight: 700; padding: 3px 6px; border-radius: 5px; backdrop-filter: blur(4px); border: 1px solid rgba(var(--accent-rgb), 0.3); }
    .watchlist-btn { margin-top: 8px; background: rgba(255,255,255,0.2); border: none; border-radius: 20px; padding: 5px 10px; font-size: 11px; cursor: pointer; color: #fff; font-weight: 600; transition: 0.2s; }
    .watchlist-btn.in-watchlist { background: #ff4444; color: #fff; }
    .progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent); width: 0%; transition: width 0.3s; border-radius: 0 0 0 var(--radius); }
    .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; width: 100%; }
    #playerModal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.96); backdrop-filter: blur(15px); padding: 20px; overflow-y: auto; }
    #playerModal.open { display: block; animation: modalFade 0.3s ease; }
    @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { max-width: 1100px; margin: 0 auto; width: 100%; }
    .player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; gap: 1rem; flex-wrap: wrap; }
    .player-actions { display: flex; gap: 10px; align-items: center; }
    .close-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; flex-shrink: 0; }
    .player-watchlist-btn { background: rgba(255,255,255,0.15); border: 1px solid var(--border); border-radius: 30px; padding: 8px 16px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; color: white; font-weight: 500; }
    .player-watchlist-btn.in-watchlist { background: #ff4444; border-color: #ff4444; }
    .iframe-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); margin-bottom: 25px; }
    .iframe-container iframe { width: 100%; height: 100%; border: none; }
    .p-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8rem, 5vw, 2.8rem); line-height: 1; margin-bottom: 8px; }
    .p-meta { display: flex; gap: 15px; color: var(--muted); margin-bottom: 15px; font-size: 0.9rem; flex-wrap: wrap; }
    .p-overview { font-size: 1rem; line-height: 1.6; color: #ccc; max-width: 800px; }
    .source-toggle { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .src-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 0.78rem; font-weight: 600; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: var(--transition); font-family: inherit; }
    .src-btn:hover { border-color: rgba(var(--accent-rgb), 0.5); color: var(--text); }
    .src-btn.active { background: rgba(var(--accent-rgb), 0.15); border-color: var(--accent); color: var(--accent); }
    footer { padding: 3rem 5%; text-align: center; border-top: 1px solid var(--border); margin-top: 3rem; color: var(--muted); font-size: 0.85rem; width: 100%; }
    @media (max-width: 768px) {
      .shuffler-break { flex-direction: column; gap: 1.5rem; text-align: center; width: 95%; padding: 1.5rem; }
      .shuffler-display { flex-direction: column; gap: 1.5rem; }
      .shuffler-info { transform: none; text-align: center; }
      .shuffler-btns { justify-content: center; }
      .nav-links { display: none; }
      .nav-links.mobile-open { display: flex; flex-direction: column; position: absolute; top: 70px; left: 0; right: 0; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); padding: 1rem; border-bottom: 1px solid rgba(var(--accent-rgb), 0.18); }
      .mobile-menu-btn { display: block; }
      .search-wrap { display: none; }
      .search-wrap.active { display: block; position: absolute; top: 70px; left: 0; right: 0; background: rgba(10,10,15,0.95); padding: 10px 4%; z-index: 999; }
      nav { height: 60px; justify-content: space-between; }
      .hero-title { font-size: 2.8rem; }
    }
    @media (max-width: 480px) {
      .promo-banner { gap: 8px; padding: 8px 12px; }
      .promo-title { font-size: 0.8rem; }
      .promo-subtitle { font-size: 0.68rem; }
      .promo-btn { padding: 4px 10px; font-size: 0.72rem; }
    }
  </style>
</head>
<body class="theme-home">

<!-- Hypastack Top Promo Banner Badge -->
<div class="promo-banner">
  <img src="https://r2.hypastack.com/cdn/lvko6iovrtq7/footer.webp" alt="Hypastack Icon" class="promo-icon">
  <div class="promo-text">
    <span class="promo-title">Check out Hypastack!</span>
    <span class="promo-subtitle">Free Storage X Full Privacy</span>
  </div>
  <a href="https://hypastack.com" target="_blank" rel="noopener" class="promo-btn">Visit Hypastack</a>
</div>

<nav>
  <div class="logo" onclick="Router.go('home')">🦆 StreamDuck</div>
  <div class="nav-links" id="navLinks">
    <button class="nav-btn" data-sec="home" onclick="Router.go('home')">Home</button>
    <button class="nav-btn" data-sec="movies" onclick="Router.go('movies')">Movies</button>
    <button class="nav-btn" data-sec="tv" onclick="Router.go('tv')">TV Shows</button>
    <button class="nav-btn" data-sec="trending" onclick="Router.go('trending')">Trending</button>
    <button class="nav-btn" data-sec="anime" onclick="Router.go('anime')">Anime</button>
  </div>
  <div class="search-wrap" id="searchWrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search movies or shows..." autocomplete="off">
  </div>
  <div style="display: flex; gap: 10px;">
    <button class="mobile-menu-btn" onclick="UI.toggleSearch()">🔍</button>
    <button class="mobile-menu-btn" onclick="UI.toggleMobileMenu()">☰</button>
  </div>
</nav>

<main id="app"></main>

<template id="home-tpl">
  <div id="hero" class="fade-in">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-fade"></div>
    <div class="hero-content">
      <div class="hero-badge">✨ Featured</div>
      <h1 class="hero-title" id="heroTitle">Loading...</h1>
      <div class="hero-meta" id="heroMeta"></div>
      <p class="hero-overview" id="heroOverview"></p>
      <div class="hero-actions">
        <button class="btn btn-primary" id="heroPlayBtn">▶ Watch Now</button>
        <button class="btn btn-secondary" id="heroInfoBtn">More Info</button>
      </div>
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <div id="continue-section" class="section fade-in hidden-section">
    <div class="section-header">
      <h2 class="section-title">⏯️ Continue Watching</h2>
      <a class="see-all" onclick="ContinueWatching.clearAll()">Clear All</a>
    </div>
    <div class="scroll-row" id="continue-row"></div>
  </div>

  <div id="watchlist-section" class="section fade-in hidden-section">
    <div class="section-header">
      <h2 class="section-title">📌 My Watchlist</h2>
      <a class="see-all" onclick="Watchlist.render()">Refresh</a>
    </div>
    <div class="scroll-row" id="watchlist-row"></div>
  </div>

  <div class="section fade-in">
    <div class="section-header"><h2 class="section-title">🔥 Trending Now</h2><a class="see-all" onclick="Router.go('trending')">See All →</a></div>
    <div class="scroll-row" id="trendingRow"></div>
  </div>

  <div class="shuffler-break fade-in">
    <div class="shuffler-text">
      <h2 class="shuffler-title">Stuck on what to watch?</h2>
      <p class="shuffler-desc">Let the Duck pick your next adventure.</p>
      <button class="btn btn-primary" id="shuffleInitBtn" onclick="App.shuffle()">🎲 Spin the Wheel</button>
    </div>
    <div class="shuffler-display">
      <div class="shuffler-card-wrap">
        <div class="shuffler-card" id="shuffleCard"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=400" id="shuffleImg"></div>
      </div>
      <div class="shuffler-info" id="shuffleInfo">
        <div class="shuffler-name" id="shuffleName">???</div>
        <div class="shuffler-btns">
          <button class="btn btn-primary" id="shufflePlayBtn">▶ Play</button>
          <button class="btn btn-secondary" onclick="App.shuffle()" style="padding: 10px; width: 44px;">🔄</button>
        </div>
      </div>
    </div>
  </div>

  <div class="section fade-in">
    <div class="section-header"><h2 class="section-title">🎬 Popular Movies</h2><a class="see-all" onclick="Router.go('movies')">See All →</a></div>
    <div class="scroll-row" id="topRatedRow"></div>
  </div>

  <div class="section fade-in">
    <div class="section-header"><h2 class="section-title">📺 Popular TV Shows</h2><a class="see-all" onclick="Router.go('tv')">See All →</a></div>
    <div class="scroll-row" id="tvRow"></div>
  </div>
</template>

<template id="grid-tpl">
  <div class="section fade-in">
    <h1 id="gridTitle" class="section-title" style="font-size: 2.2rem; margin-bottom: 1rem;"></h1>
    <div class="movie-grid" id="movieGrid"></div>
  </div>
</template>

<template id="search-tpl">
  <div class="section fade-in">
    <h1 id="searchTitle" class="section-title" style="margin-bottom: 1.5rem;"></h1>
    <div class="movie-grid" id="searchGrid"></div>
  </div>
</template>

<div id="playerModal">
  <div class="modal-content">
    <div class="player-header">
      <div style="flex: 1;">
        <h2 class="p-title" id="pTitle"></h2>
        <div class="p-meta" id="pMeta"></div>
      </div>
      <div class="player-actions">
        <button class="player-watchlist-btn" id="playerWatchlistBtn">📋 + Watchlist</button>
        <button class="close-btn" onclick="UI.closePlayer()">✕</button>
      </div>
    </div>
    <div class="source-toggle">
      <button class="src-btn active" onclick="UI.switchSource('pulp', this)">Source 1</button>
      <button class="src-btn" onclick="UI.switchSource('vidapi', this)">Source 2</button>
    </div>
    <div class="iframe-container"><iframe id="playerIframe" allowfullscreen allow="autoplay; encrypted-media" referrerpolicy="no-referrer"></iframe></div>
  </div>
</div>

<footer>
  <p>&copy; 2026 StreamDuck. Powered by TMDB API Data.</p>
</footer>

<script>
  // Dynamic API configuration with your embedded v3 key
  const TMDB_API_KEY = "a31a9bbd61ad9d66f465457558a2d397"; 
  const TMDB_BASE_URL = "https://api.themoviedb.org/3";
  const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w500";
  const TMDB_BACKDROP_BASE = "https://image.tmdb.org/t/p/original";
  
  // Storage Engines
  const Watchlist = {
    items: JSON.parse(localStorage.getItem('duck_watchlist')) || [],
    toggle(item) {
      const index = this.items.findIndex(i => i.id === item.id);
      if (index > -1) this.items.splice(index, 1);
      else this.items.push(item);
      localStorage.setItem('duck_watchlist', JSON.stringify(this.items));
      this.render();
      UI.updatePlayerWatchlistBtn(item.id);
    },
    has(id) { return this.items.some(i => i.id === id); },
    render() {
      const row = document.getElementById('watchlist-row');
      const sec = document.getElementById('watchlist-section');
      if (!row || !sec) return;
      if (this.items.length === 0) { sec.classList.add('hidden-section'); return; }
      sec.classList.remove('hidden-section');
      row.innerHTML = this.items.map(item => UI.createCardMarkup(item)).join('');
    }
  };

  const ContinueWatching = {
    items: JSON.parse(localStorage.getItem('duck_continue')) || [],
    save(item, progress = 0) {
      const index = this.items.findIndex(i => i.id === item.id);
      const data = { ...item, progress };
      if (index > -1) this.items.splice(index, 1);
      this.items.unshift(data);
      localStorage.setItem('duck_continue', JSON.stringify(this.items));
      this.render();
    },
    clearAll() {
      this.items = [];
      localStorage.removeItem('duck_continue');
      this.render();
    },
    render() {
      const row = document.getElementById('continue-row');
      const sec = document.getElementById('continue-section');
      if (!row || !sec) return;
      if (this.items.length === 0) { sec.classList.add('hidden-section'); return; }
      sec.classList.remove('hidden-section');
      row.innerHTML = this.items.map(item => UI.createCardMarkup(item, true)).join('');
    }
  };

  // Router Core
  const Router = {
    current: 'home',
    go(route) {
      this.current = route;
      document.body.className = `theme-${route}`;
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-sec') === route);
      });
      const app = document.getElementById('app');
      const tplId = (route === 'home') ? 'home-tpl' : 'grid-tpl';
      const template = document.getElementById(tplId);
      if(template) {
        app.innerHTML = template.innerHTML;
        App.initSection(route);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  // Main API Data Fetching App Engine
  const App = {
    shufflePool: [],
    currentPlayerItem: null,
    currentSource: 'pulp',
    
    async tmdbFetch(endpoint, queryParams = "") {
      try {
        const response = await fetch(`${TMDB_BASE_URL}${endpoint}?api_key=${TMDB_API_KEY}&language=en-US${queryParams}`);
        return await response.json();
      } catch (err) {
        console.error("API Fetch Failure: ", err);
      }
    },

    async init() {
      Router.go('home');
      document.getElementById('searchInput').addEventListener('input', (e) => this.handleSearch(e.target.value));
    },

    async initSection(section) {
      if (section === 'home') {
        Watchlist.render();
        ContinueWatching.render();
        
        // Fetch trending content to build out hero spotlight banner
        const trendingData = await this.tmdbFetch('/trending/all/day');
        if (trendingData && trendingData.results.length > 0) {
          this.shufflePool = trendingData.results;
          const heroItem = trendingData.results[0];
          this.renderHero(heroItem);
          
          const trendRow = document.getElementById('trendingRow');
          if (trendRow) trendRow.innerHTML = trendingData.results.map(i => UI.createCardMarkup(i)).join('');
        }

        // Populate sections dynamically
        const movieData = await this.tmdbFetch('/movie/popular');
        if(movieData && document.getElementById('topRatedRow')) {
          document.getElementById('topRatedRow').innerHTML = movieData.results.map(i => ({...i, media_type:'movie'})).map(i => UI.createCardMarkup(i)).join('');
        }

        const tvData = await this.tmdbFetch('/tv/popular');
        if(tvData && document.getElementById('tvRow')) {
          document.getElementById('tvRow').innerHTML = tvData.results.map(i => ({...i, media_type:'tv'})).map(i => UI.createCardMarkup(i)).join('');
        }
      } else {
        const titleEl = document.getElementById('gridTitle');
        if (titleEl) titleEl.innerText = section.toUpperCase();
        this.populateGridRows(section);
      }
    },

    renderHero(item) {
      const title = item.title || item.name;
      const release = item.release_date || item.first_air_date || 'N/A';
      const bg = document.getElementById('heroBg');
      
      if (bg) {
        bg.style.backgroundImage = item.backdrop_path 
          ? `url('${TMDB_BACKDROP_BASE}${item.backdrop_path}')` 
          : `url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1200')`;
      }
      
      document.getElementById('heroTitle').innerText = title;
      document.getElementById('heroOverview').innerText = item.overview || "No overview available.";
      document.getElementById('heroMeta').innerHTML = `<span>⭐ ${item.vote_average || 0}</span> | <span>${release}</span>`;
      
      const parsedItem = { ...item, media_type: item.media_type || (item.title ? 'movie' : 'tv') };
      document.getElementById('heroPlayBtn').onclick = () => UI.openPlayer(parsedItem);
      document.getElementById('heroInfoBtn').onclick = () => UI.openPlayer(parsedItem);
    },

    async populateGridRows(type) {
      const grid = document.getElementById('movieGrid');
      if (!grid) return;
      
      let endpoint = '/movie/popular';
      if (type === 'tv') endpoint = '/tv/popular';
      if (type === 'trending') endpoint = '/trending/all/week';
      if (type === 'anime') endpoint = '/discover/tv', query = "&with_genres=16&with_keywords=210024"; 
      
      const data = await this.tmdbFetch(endpoint);
      if(data && data.results) {
        grid.innerHTML = data.results.map(i => ({...i, media_type: i.media_type || (type==='tv'?'tv':'movie')})).map(item => UI.createCardMarkup(item)).join('');
      }
    },

    shuffle() {
      const card = document.getElementById('shuffleCard');
      const info = document.getElementById('shuffleInfo');
      const btn = document.getElementById('shuffleInitBtn');
      
      if(btn) btn.style.display = 'none';
      if(card) card.classList.add('spinning');
      
      setTimeout(() => {
        if(card) card.classList.remove('spinning');
        const pool = this.shufflePool.length ? this.shufflePool : Watchlist.items;
        if(!pool.length) return;
        
        const randomItem = pool[Math.floor(Math.random() * pool.length)];
        const imgEl = document.getElementById('shuffleImg');
        if(imgEl && randomItem.poster_path) imgEl.src = `${TMDB_IMAGE_BASE}${randomItem.poster_path}`;
        
        document.getElementById('shuffleName').innerText = randomItem.title || randomItem.name;
        if(info) info.classList.add('visible');
        
        const parsedItem = { ...randomItem, media_type: randomItem.media_type || (randomItem.title ? 'movie' : 'tv') };
        document.getElementById('shufflePlayBtn').onclick = () => UI.openPlayer(parsedItem);
      }, 900);
    },

    async handleSearch(query) {
      if (!query.trim()) {
        if (Router.current === 'search') Router.go('home');
        return;
      }
      
      if (Router.current !== 'search') {
        const app = document.getElementById('app');
        const template = document.getElementById('search-tpl');
        if(template) { app.innerHTML = template.innerHTML; Router.current = 'search'; }
      }
      
      document.getElementById('searchTitle').innerText = `Search results for: "${query}"`;
      const data = await this.tmdbFetch('/search/multi', `&query=${encodeURIComponent(query)}`);
      
      const grid = document.getElementById('searchGrid');
      if(grid && data && data.results) {
        const filtered = data.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv');
        grid.innerHTML = filtered.length 
          ? filtered.map(item => UI.createCardMarkup(item)).join('')
          : `<p style="grid-column: 1/-1; text-align:center; color:var(--muted); padding:3rem 0;">No active stream channels found matching that query.</p>`;
      }
    }
  };

  // Graphical Render Layer
  const UI = {
    toggleMobileMenu() {
      const links = document.getElementById('navLinks');
      if(links) links.classList.toggle('mobile-open');
    },

    toggleSearch() {
      const wrap = document.getElementById('searchWrap');
      if(wrap) wrap.classList.toggle('active');
    },

    createCardMarkup(item, includeProgress = false) {
      const title = item.title || item.name;
      const date = item.release_date || item.first_air_date || '';
      const year = date ? date.split('-')[0] : '';
      const poster = item.poster_path ? `${TMDB_IMAGE_BASE}${item.poster_path}` : 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=350';
      const rating = item.vote_average ? Number(item.vote_average).toFixed(1) : 'NR';
      
      const normalizedItem = {
        id: item.id, title: title, release_date: date,
        vote_average: rating, poster_path: item.poster_path,
        media_type: item.media_type || (item.title ? 'movie' : 'tv')
      };

      return `
        <div class="card" onclick="UI.openPlayer(${JSON.stringify(normalizedItem).replace(/"/g, '&quot;')})">
          <img class="card-poster" src="${poster}" alt="${title}" loading="lazy">
          <div class="card-rating">⭐ ${rating}</div>
          <div class="card-overlay">
            <div class="card-title">${title}</div>
            <div class="card-year">${year}</div>
          </div>
          ${includeProgress ? `<div class="progress-bar" style="width: ${item.progress || 40}%"></div>` : ''}
        </div>
      `;
    },

    openPlayer(item) {
      App.currentPlayerItem = item;
      const modal = document.getElementById('playerModal');
      
      document.getElementById('pTitle').innerText = item.title;
      document.getElementById('pMeta').innerHTML = `<span>Release: ${item.release_date}</span> • <span>Rating: ⭐ ${item.vote_average}</span>`;
      
      this.updatePlayerWatchlistBtn(item.id);
      this.loadIframeSource();
      
      if(modal) modal.classList.add('open');
      ContinueWatching.save(item, Math.floor(Math.random() * 60) + 20);
      
      document.getElementById('playerWatchlistBtn').onclick = () => {
        Watchlist.toggle(App.currentPlayerItem);
      };
    },

    closePlayer() {
      const modal = document.getElementById('playerModal');
      const iframe = document.getElementById('playerIframe');
      if(iframe) iframe.src = "";
      if(modal) modal.classList.remove('open');
    },

    switchSource(src, btn) {
      App.currentSource = src;
      document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
      if(btn) btn.classList.add('active');
      this.loadIframeSource();
    },

    loadIframeSource() {
      const iframe = document.getElementById('playerIframe');
      if (!iframe || !App.currentPlayerItem) return;
      
      const id = App.currentPlayerItem.id;
      const type = App.currentPlayerItem.media_type === 'tv' ? 'tv' : 'movie';
      
      iframe.src = App.currentSource === 'pulp' 
        ? `https://vidsrc.me/embed/${type}?tmdb=${id}`
        : `https://vidsrc.to/embed/${type}/${id}`;
    },

    updatePlayerWatchlistBtn(id) {
      const btn = document.getElementById('playerWatchlistBtn');
      if (!btn) return;
      if (Watchlist.has(id)) {
        btn.innerText = "❤️ In Watchlist";
        btn.classList.add('in-watchlist');
      } else {
        btn.innerText = "📋 + Watchlist";
        btn.classList.remove('in-watchlist');
      }
    }
  };

  window.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
